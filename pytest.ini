[pytest]
pythonpath = .
asyncio_mode = auto
addopts = -ra -q --strict-markers --alluredir=allure-results
testpaths = tests
markers =
    smoke: Critical happy-path tests
    contract: Contract/schema validation tests
    integration: Real API integration tests
    negative: Negative API scenarios
    fuzz: Property-based and fuzz tests
log_cli = true
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
log_level = DEBUG
filterwarnings =
    ignore::DeprecationWarning
