name: API Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pre-commit quality gate
        run: pre-commit run --all-files

      - name: Run smoke + contract tests with coverage gate
        run: |
          pytest -m "smoke or contract" -n auto \
            --cov=clients --cov=services --cov=models --cov=utils \
            --cov-report=term-missing --cov-report=xml --cov-fail-under=85 \
            --alluredir=allure-results

      - name: Build Allure report
        uses: simple-elf/allure-report-action@v1.10
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-${{ matrix.python-version }}
          path: allure-report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml
